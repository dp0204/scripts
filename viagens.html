<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda de Bilhetes de Avião</title>
  <style>
    /* Estilos CSS para o design gráfico */
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f1f1;
      margin: 0;
      padding: 0;
    }
    
    header {
      background-color: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    
    h1 {
      margin: 0;
    }
    
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
    }
    
    .ticket {
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .ticket h2 {
      margin: 0;
      font-size: 24px;
    }
    
    .ticket p {
      margin: 10px 0;
    }
    
    .button {
      display: inline-block;
      background-color: #333;
      color: #fff;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 4px;
      margin-top: 10px;
    }
    
    .button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Venda de Bilhetes de Avião</h1>
  </header>
  
  <div class="container">
    <div class="ticket">
      <h2>Bilhete de Avião</h2>
      <p><strong>Origem:</strong> Cidade de Origem</p>
      <p><strong>Destino:</strong> Cidade de Destino</p>
      <p><strong>Data:</strong> Data do Voo</p>
      <p><strong>Horário:</strong> Horário do Voo</p>
      <p><strong>Preço:</strong> Preço do Bilhete</p>
      <a href="#" class="button">Comprar</a>
    </div>
    
    <!-- Outros bilhetes de avião -->
    
  </div>
</body>
</html>
