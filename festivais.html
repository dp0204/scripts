<!DOCTYPE html>
<html>
<head>
    <title>Venda de Bilhetes para Festivais</title>
    <style>
       
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f1f1;
            margin: 0;
            padding: 0;
             background-image: url('https://wallpapercosmos.com/w/full/5/9/a/1161080-3840x2160-desktop-4k-concert-wallpaper-image.jpg');
        }
        
        #header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        #content {
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            margin-top: 0;
        }
        
        .event {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .event h2 {
            margin-top: 0;
        }
        
        .event p {
            margin-bottom: 0;
        }
        
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Venda de Bilhetes para Festivais</h1>
    </div>
    
    <div id="content">
        <div class="event">
            <h2>Festival 1</h2>
            <p>Data: 12/07/2023</p>
            <p>Local: Estádio XPTO</p>
            <p>Preço: $40</p>
            <a href="#" class="button">Comprar</a>
        </div>
        
        <div class="event">
            <h2>Festival 2</h2>
            <p>Data: 02/08/2023</p>
            <p>Local: Arena ABC</p>
            <p>Preço: $50</p>
            <a href="#" class="button">Comprar</a>
        </div>
        
        <div class="event">
            <h2>Festival 3</h2>
            <p>Data: 27/08/2023</p>
            <p>Local: Estádio XYZ</p>
            <p>Preço: $45</p>
            <a href="#" class="button">Comprar</a>
        </div>
    </div>
</body>
</html>
