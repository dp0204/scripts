<!DOCTYPE html>
<html>
<head>
    <title>Bilhetes para Festivais</title>
    <style>
       
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f1f1;
            margin: 0;
            padding: 0;
            background-image: url('https://e0.pxfuel.com/wallpapers/519/724/desktop-wallpaper-concert-crowd-people-light-laser-party-widescreen-16-9-background-2560x1440-party.jpg');
        }
        
        #header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            margin-top: 0;
        }
        
        .event {
   			max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        .event h2 {
            margin-top: 0;
        }
        
        .event p {
            margin-bottom: 0;
        }
        
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Bilhetes para Festivais</h1>
    </div>
        <div class="event">
            <h2>Sumol Summer Fest</h2>
            <p>Data: 01/07/2023</p>
            <p>Local: Parque de Campismo Inatel</p>
            <p>Preço: $40</p>
            <label for="quantidade">Quantidade:</label>
      		<input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
            <a href="#" class="button">Comprar</a>
        </div>
        
        <div class="event">
            <h2>Nova Era Beach Party</h2>
            <p>Data: 30/06/2023</p>
            <p>Local: Praia do Aterro Norte</p>
            <p>Preço: $50</p>
            <label for="quantidade">Quantidade:</label>
      		<input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
            <a href="#" class="button">Comprar</a>
        </div>
        
        <div class="event">
            <h2>NOS Alive 23</h2>
            <p>Data: 06/08/2023</p>
            <p>Local: Passeio Marítimo de Algés</p>
            <p>Preço: $90</p>
            <label for="quantidade">Quantidade:</label>
      		<input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
            <a href="#" class="button">Comprar</a>
        </div>
    </div>
</body>
</html>
