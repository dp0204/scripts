<!DOCTYPE html>
<html>
<head>
    <title>Venda de Bilhetes de Eventos Desportivos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f1f1;
            margin: 0;
            padding: 0;
            background: url('https://dbdzm869oupei.cloudfront.net/img/vinylrugs/preview/38000.png');
        }
        
        #header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        #content {
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            margin-top: 0;
        }
        
        .event {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .event h2 {
            margin-top: 0;
        }
        
        .event p {
            margin-bottom: 0;
        }
        
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Venda de Bilhetes de Eventos Desportivos</h1>
    </div>
    
    <div id="content">
        <div class="event">
            <h2>Evento 1</h2>
            <p>Data: 01/06/2023</p>
            <p>Local: Estádio XPTO</p>
            <p>Preço: $10</p>
            <br>
            <label for="quantidade">Quantidade:</label>
      <input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
      <br/>
            
            <a href="#" class="button">Comprar</a>
            
        </div>
        
        <div class="event">
            <h2>Evento 2</h2>
            <p>Data: 10/06/2023</p>
            <p>Local: Arena ABC</p>
            <p>Preço: $15</p>
            <br>
            <label for="quantidade">Quantidade:</label>
      <input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
      <br/>
            <a href="#" class="button">Comprar</a>
        </div>
        
        <div class="event">
            <h2>Evento 3</h2>
            <p>Data: 20/06/2023</p>
            <p>Local: Estádio XYZ</p>
            <p>Preço: $12</p>
            <br>
            <label for="quantidade">Quantidade:</label>
      <input type="number" id="quantidade" name="quantidade" min="1" max="10" required>
      <br/>
            <a href="#" class="button">Comprar</a>
        </div>
    </div>
</body>
</html>
